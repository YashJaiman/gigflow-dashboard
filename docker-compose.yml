version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: gigflow-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: gigflow
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gigflow-backend
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/gigflow
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key}
      CORS_ORIGIN: http://localhost:5173
      PORT: 5000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./server/dist:/app/dist
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gigflow-frontend
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
